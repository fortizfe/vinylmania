<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinylmania</title>
    <!-- "Anton" wordmark display font (feature 034, research.md §6): loaded
         with display=swap so text is never blocked/invisible while it loads;
         layout stability comes from the brand-mark containers being sized by
         the icon, not the wordmark's font metrics. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&display=swap"
      rel="stylesheet"
    />
    <script>
      // No-flash theme bootstrap (FR-015, research.md R1): paints the
      // correct theme before the SPA mounts, mirroring ThemeContext's own
      // resolution order (cached preference, then OS setting).
      (function () {
        try {
          var stored = window.localStorage.getItem('vinylmania:theme-preference');
          var isDark =
            stored === 'dark' ||
            (stored !== 'light' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch {
          // localStorage/matchMedia unavailable (e.g. private browsing) —
          // ThemeContext will resolve the theme once React mounts instead.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
